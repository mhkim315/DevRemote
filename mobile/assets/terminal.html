<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,interactive-widget=resizes-content">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.15.0/css/xterm.css" />
<script src="https://cdn.jsdelivr.net/npm/xterm@4.15.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.5.0/lib/xterm-addon-fit.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
#terminal-container{width:100%;height:100%;padding:2px}
.xterm-viewport::-webkit-scrollbar{width:8px}
.xterm-viewport::-webkit-scrollbar-thumb{background:#444;border-radius:4px}
</style>
</head>
<body>
<div id="terminal-container"></div>
<script>
const term = new Terminal({
  cursorBlink: true,
  fontSize: 12,
  fontFamily: 'Menlo, Monaco, "Courier New", monospace',
  theme: {
    background: '#000',
    foreground: '#ccc',
    cursor: '#ccc',
    selectionBackground: '#444'
  },
  scrollback: 5000,
  allowProposedApi: true
});

const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal-container'));
fitAddon.fit();

// Receive terminal data from React Native.
function handleData(data) {
  if (typeof data === 'string' && data.length > 0) {
    term.write(data);
  }
}
document.addEventListener('message', e => handleData(e.data));
window.addEventListener('message', e => handleData(e.data));

// Auto-scroll.
term.onData(() => term.scrollToBottom());

// Resize.
window.addEventListener('resize', () => { try { fitAddon.fit(); } catch {} });
setTimeout(() => { try { fitAddon.fit(); } catch {} }, 100);
</script>
</body>
</html>
