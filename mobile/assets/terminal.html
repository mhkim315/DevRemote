<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0d1117;overflow:hidden}
#terminal{width:100%;height:100%}
</style>
</head>
<body>
<div id="terminal"></div>
<script>
const term = new Terminal({
  cursorBlink: true,
  fontSize: 12,
  fontFamily: 'Menlo, Monaco, "Courier New", monospace',
  theme: {
    background: '#0d1117',
    foreground: '#c9d1d9',
    cursor: '#c9d1d9',
    selectionBackground: '#264f78',
    black: '#484f58',
    red: '#ff7b72',
    green: '#3fb950',
    yellow: '#d29922',
    blue: '#58a6ff',
    magenta: '#bc8cff',
    cyan: '#39c5bb',
    white: '#b1bac4',
    brightBlack: '#6e7681',
    brightRed: '#ffa198',
    brightGreen: '#56d364',
    brightYellow: '#e3b341',
    brightBlue: '#79c0ff',
    brightMagenta: '#d2a8ff',
    brightCyan: '#56d4dd',
    brightWhite: '#f0f6fc'
  },
  allowProposedApi: true
});

const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));
fitAddon.fit();

// Receive PTY data from React Native via postMessage.
window.addEventListener('message', (event) => {
  const data = event.data;
  if (typeof data === 'string') {
    term.write(data);
  }
});

// Forward user input back to React Native.
term.onData((data) => {
  window.ReactNativeWebView?.postMessage(JSON.stringify({type:'stdin',text:data}));
});

// Resize handler.
window.addEventListener('resize', () => fitAddon.fit());
</script>
</body>
</html>
